name: SAIDI SAIFI Pipeline

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      states:
        description: 'JSON array of lowercase state codes to process (e.g. ["al","ga"])'
        required: false
        default: ''

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  determine-states:
    name: Resolve state matrix
    runs-on: ubuntu-latest
    outputs:
      states: ${{ steps.choose.outputs.states }}
    steps:
      - name: Choose states for matrix
        id: choose
        env:
          DEFAULT_MATRIX: '["ga"]'
          DISPATCH_STATES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.states || '' }}
          VAR_STATES: ${{ vars.STATE_MATRIX }}
        run: |
          python - <<'PY'
          import json
          import os

          matrix = (
              os.environ.get("DISPATCH_STATES")
              or os.environ.get("VAR_STATES")
              or os.environ["DEFAULT_MATRIX"]
          )

          try:
              parsed = json.loads(matrix)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"State matrix must be valid JSON array: {exc}")

          if not isinstance(parsed, list) or not parsed:
              raise SystemExit("Provide at least one state in the matrix JSON array.")

          normalized = []
          for value in parsed:
              if not isinstance(value, str):
                  raise SystemExit("State matrix entries must be strings.")
              value = value.strip().lower()
              if not value:
                  raise SystemExit("State matrix entries cannot be empty.")
              normalized.append(value)

          matrix_json = json.dumps(normalized)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"states={matrix_json}\n")
          PY

  state-pipeline:
    name: Run pipeline for ${{ matrix.state }}
    needs: determine-states
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        state: ${{ fromJson(needs.determine-states.outputs.states) }}
    env:
      STATE_CODE: ${{ matrix.state }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -s requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Execute pipeline
        run: |
          python main.py "$STATE_CODE"

      - name: Collect CSV output
        id: collect
        run: |
          set -euo pipefail
          mkdir -p state-output
          lower='${{ matrix.state }}'
          upper=$(printf '%s' "$lower" | tr '[:lower:]' '[:upper:]')
          target="state-output/${upper}.csv"

          if [ -f "${lower}.csv" ]; then
            cp "${lower}.csv" "$target"
          elif [ -f "${upper}.csv" ]; then
            cp "${upper}.csv" "$target"
          elif compgen -G "*.csv" > /dev/null; then
            first_csv=$(ls *.csv | head -n 1)
            cp "$first_csv" "$target"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No CSV file detected for ${lower}; skipping artifact upload."
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "csv_path=$target" >> "$GITHUB_OUTPUT"

      - name: Upload CSV artifact
        if: ${{ steps.collect.outputs.found == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: state-${{ matrix.state }}
          path: ${{ steps.collect.outputs.csv_path }}
          if-no-files-found: error
          retention-days: 7

  aggregate-results:
    name: Aggregate CSV outputs
    needs: state-pipeline
    if: ${{ needs.state-pipeline.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download state artifacts
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: state-*
          merge-multiple: true
          path: combined-results

      - name: Upload combined artifact
        if: ${{ steps.download.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: processed-saidi-saifi
          path: combined-results
          if-no-files-found: warn

          
